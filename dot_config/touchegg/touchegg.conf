<?xml version="1.0" encoding="UTF-8"?>
<!--
  Touch gestures for the Surface tablet running bspwm.

  Rationale: bspwm is keyboard-driven, which is useless with no keyboard attached.
  These gestures cover the essentials without one:
    3-finger swipe left/right  -> switch desktop
    4-finger swipe up          -> toggle the on-screen keyboard (the escape hatch)
    4-finger swipe down        -> rofi launcher
    3-finger swipe up          -> fullscreen toggle
    3-finger swipe down        -> close window
-->
<touchégg>

<settings>
  <property name="animation_delay">150</property>
  <property name="action_execute_threshold">20</property>
  <property name="color">auto</property>
  <property name="borderColor">auto</property>
</settings>

<application name="All">

  <gesture type="SWIPE" fingers="3" direction="RIGHT">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>bspc desktop -f prev.local</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="SWIPE" fingers="3" direction="LEFT">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>bspc desktop -f next.local</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="SWIPE" fingers="3" direction="UP">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>bspc node -t ~fullscreen</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="SWIPE" fingers="3" direction="DOWN">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>bspc node -c</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="SWIPE" fingers="4" direction="UP">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>osk-toggle</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="SWIPE" fingers="4" direction="DOWN">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>rofi -show drun</command>
      <on>begin</on>
    </action>
  </gesture>

  <gesture type="PINCH" fingers="4" direction="IN">
    <action type="RUN_COMMAND">
      <repeat>false</repeat>
      <command>rofi -show window</command>
      <on>begin</on>
    </action>
  </gesture>

</application>

</touchégg>
