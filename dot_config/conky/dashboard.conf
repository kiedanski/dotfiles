-- ~/.config/conky/dashboard.conf
-- Two-column metrics dashboard for bspwm desktop 10 (super+0).
-- Conky centres ITSELF (alignment=top_middle); the bspwm rule only pins it to
-- desktop 10 and makes it a borderless, unfocused, floating window.
-- Columns are done with ${goto <px>} inside one window so they can't drift.
--
-- NO network calls happen inside conky (they would block the render loop):
--   * time / timezone come from the OS (systemd-timesyncd + tzupdate)
--   * weather is fetched by ~/.config/conky/update-metrics.sh into cache files
--     that we read here with a cheap `cat`.
-- Theme: Dracula.

conky.config = {
    own_window                  = true,
    own_window_type             = 'normal',
    own_window_class            = 'Conky',
    own_window_name             = 'conky-dashboard',
    own_window_hints            = 'undecorated,below,skip_taskbar,skip_pager',
    own_window_argb_visual      = true,
    own_window_argb_value       = 220,
    own_window_colour           = '282a36',
    double_buffer               = true,

    alignment                   = 'top_middle',
    gap_x                       = 0,
    gap_y                       = 150,
    minimum_width               = 800,
    minimum_height              = 440,
    border_inner_margin         = 24,
    border_outer_margin         = 0,

    use_xft                     = true,
    font                        = 'JetBrainsMono Nerd Font:size=11',
    override_utf8_locale        = true,

    update_interval             = 5.0,
    total_run_times             = 0,
    background                  = false,
    no_buffers                  = true,
    cpu_avg_samples             = 2,
    net_avg_samples             = 2,
    draw_shades                 = false,
    draw_outline                = false,
    draw_borders                = false,
    draw_graph_borders          = false,

    default_color               = 'f8f8f2',
    color1                      = 'bd93f9', -- purple : section headers
    color2                      = '44475a', -- grey   : rules
    color3                      = 'ff79c6', -- pink   : hostname
    color4                      = '6272a4', -- muted  : labels
    color5                      = '8be9fd', -- cyan   : bars
    color6                      = '50fa7b', -- green  : clock / battery
}

-- Layout columns (px from window left): left labels @24, left values @165,
-- right column starts @430.
conky.text = [[
${voffset 4}${color3}${nodename}${color}${alignr}${color4}${time %A %d %B}   up ${uptime_short}${color}
${voffset 4}${color2}${hr 1}${color}
${voffset 8}${color1}CLOCKS${color}${goto 430}${color1}CPU${color}
${voffset 4}${color4}current${color}${goto 165}${color6}${time %H:%M}${color}${goto 430}total${alignr}${cpu cpu0} %   ${freq_g} GHz
${color4}Uruguay${color}${goto 165}${tztime America/Montevideo %H:%M}${goto 430}${color5}${cpubar 8}${color}
${color4}San Fran${color}${goto 165}${tztime America/Los_Angeles %H:%M}${goto 430}${color4}${top name 1}${alignr}${top cpu 1} %${color}
${goto 430}${color4}${top name 2}${alignr}${top cpu 2} %${color}
${voffset 8}${color1}WEATHER${color}${goto 430}${color1}MEMORY${color}
${voffset 4}${color4}here${color}${goto 165}${execi 30 cat $HOME/.cache/conky-w-here 2>/dev/null}${goto 430}${mem} / ${memmax}${alignr}${memperc} %
${color4}Mvdeo${color}${goto 165}${execi 30 cat $HOME/.cache/conky-w-mvd 2>/dev/null}${goto 430}${color5}${membar 8}${color}
${color4}P.Este${color}${goto 165}${execi 30 cat $HOME/.cache/conky-w-pde 2>/dev/null}${goto 430}${color4}${top_mem name 1}${alignr}${top_mem mem_res 1}${color}
${goto 430}${color4}${top_mem name 2}${alignr}${top_mem mem_res 2}${color}
${voffset 8}${color1}POWER${color}${goto 430}${color1}DISK${color}
${voffset 4}${color4}battery${color}${goto 165}${battery_percent BAT1} %   ${execi 30 cat /sys/class/power_supply/BAT1/status}${goto 430}/${alignr}${fs_used /} / ${fs_size /}  ${fs_used_perc /} %
${color6}${battery_bar 8,380 BAT1}${color}${goto 430}${color5}${fs_bar 8 /}${color}
${color4}draw${color}${goto 165}${execi 5 awk 'BEGIN{getline I<"/sys/class/power_supply/BAT1/current_now";getline V<"/sys/class/power_supply/BAT1/voltage_now";printf "%.2f",I*V/1e12}'} W${goto 430}${if_mounted /card}/card${alignr}${fs_used /card} / ${fs_size /card}  ${fs_used_perc /card} %${endif}
${color4}remaining${color}${goto 165}${battery_time BAT1}${goto 430}${if_mounted /card}${color5}${fs_bar 8 /card}${color}${endif}
]]
