# khard — TUI contacts. Reads the local vdir that vdirsyncer keeps in sync with tilde.

[addressbooks]
[[personal]]
path = ~/.local/share/contacts/default/

[general]
debug = no
default_action = list
editor = nvim
merge_editor = nvim, -d

[contact table]
display = formatted_name
group_by_addressbook = no
reverse = no
show_nicknames = no
show_uids = no
sort = last_name
localize_dates = yes

[vcard]
private_objects = Jabber, Skype, Twitter
search_in_source_files = no
skip_unparsable = yes
preferred_version = 3.0
