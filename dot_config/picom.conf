# picom — compositor with every effect off.
#
# Rationale: this tablet is a Pentium 4425Y with UHD 615 graphics. Fades, shadows,
# blur and animations all cost frames and add input latency for no functional gain.
# picom still runs because polybar's transparency and tear-free rendering need a
# compositor; it just does not paint anything decorative.
#
# picom v12+ has its own animation engine. Animations only run when an `animations`
# block defines triggers — defining none means nothing animates.

backend = "glx";
vsync = true;

# --- animations: none defined, so none run ---

# --- fading ---
fading = false;
no-fading-openclose = true;
no-fading-destroyed-argb = true;

# --- shadows ---
shadow = false;

# --- blur ---
blur-method = "none";
blur-background = false;

# --- transparency: only what polybar needs; no fancy focus dimming ---
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.0;

# --- misc ---
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
corner-radius = 0;

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = false; opacity = 1.0; };
  dropdown_menu = { shadow = false; opacity = 1.0; };
  tooltip = { shadow = false; opacity = 1.0; fade = false; };
};
