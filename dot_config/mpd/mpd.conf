# ~/.config/mpd/mpd.conf — per-user MPD instance.
# Started via:  systemctl --user enable --now mpd.service
# (No user/group/pid_file here on purpose — the systemd user service owns the
#  process lifecycle; setting those makes mpd try to daemonize/setuid and fail.)

music_directory     "/card/music"
playlist_directory  "~/.config/mpd/playlists"
db_file             "~/.config/mpd/database"
state_file          "~/.config/mpd/state"
sticker_file        "~/.config/mpd/sticker.sql"
log_file            "syslog"

# Watch the library so tracks fetched by `getmusic` show up without a manual
# `mpc update`. Falls back gracefully if /card is unmounted.
auto_update         "yes"
restore_paused      "yes"

# Listen on localhost (mpc / rmpc / polybar connect here) plus a unix socket.
bind_to_address     "127.0.0.1"
port                "6600"
bind_to_address     "~/.config/mpd/socket"

# Output through PipeWire. If this mpd build lacks the pipewire plugin, this is
# swapped for a `pulse` output at setup time (pipewire-pulse handles it either way).
audio_output {
    type    "pipewire"
    name    "PipeWire"
}
