# GTK3 settings. Relevant under bspwm, where nothing else configures GTK.
# (Under XFCE, xfsettingsd pushes its own xfconf values at runtime and wins.)
[Settings]
# No animations: this is a Pentium 4425Y — transitions cost frames and add latency.
gtk-enable-animations=0
gtk-primary-button-warps-slider=0

# Fonts are scaled via Xft.dpi in .Xresources rather than here, so GTK and
# non-GTK apps stay consistent.
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
